<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kötülüğün Anatomisi - Final Sürüm</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        :root {
            --color-high-blue: #1A53FF;
            --color-high-yellow: #FFD700;
            --color-high-ink: #141414;
            --color-high-muted: #666666;
            --color-high-line: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: white;
            color: var(--color-high-ink);
            margin: 0;
            overflow-x: hidden;
        }

        .font-serif { font-family: Georgia, serif; }
        .high-density-header { border-bottom: 2px solid var(--color-high-ink); }
        .high-density-callout { box-shadow: 4px 4px 0px rgba(0,0,0,0.05); border-radius: 2px; }
        .high-density-visualizer { 
            background: radial-gradient(circle at 50% 50%, #fafafa 0%, #ffffff 100%);
            border: 1px solid var(--color-high-line);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'high-blue': '#1A53FF',
                        'high-yellow': '#FFD700',
                        'high-ink': '#141414',
                        'high-muted': '#666666',
                        'high-line': '#e0e0e0',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const stages = [
            { id: "genetics", title: "Genetik Zemin", subtitle: "Genetics Basis", description: "Bireyin doğuştan getirdiği biyolojik miras.", factors: ["MAOA Geni", "Nörobiyoloji", "Dürtüsellik"], icon: "dna" },
            { id: "early", title: "Erken Dönem", subtitle: "Early Period", description: "Aile içi iletişim ve bakımın kalitesi.", factors: ["İhmal", "Güvensiz Bağlanma", "Yoksunluk"], icon: "home" },
            { id: "social", title: "Sosyal Öğrenme", subtitle: "Social Learning", description: "Akran etkileşimi ve aidiyet ihtiyacı.", factors: ["Zorbalık", "Sosyal Dışlanma", "Medya"], icon: "users" },
            { id: "situational", title: "Durumsal Tetik", subtitle: "Situational Triggers", description: "Kötülüğün eyleme dönüşmesindeki son aşama.", factors: ["Empati Eksikliği", "Otoriteye İtaat"], icon: "zap" },
            { id: "manifestation", title: "Dışa Vurum", subtitle: "Manifestation", description: "Yıkıcı eylemin ortaya çıktığı zirve.", factors: ["Saldırganlık", "Vicdan Kaybı"], icon: "alert-triangle" }
        ];

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [currentStage, setCurrentStage] = useState(0);

            return (
                <div className="min-h-screen bg-white p-6 md:p-10 flex flex-col max-w-7xl mx-auto space-y-16">
                    
                    {/* 1. ÜST NAVİGASYON */}
                    <nav className="high-density-header pb-4 flex justify-between items-end">
                        <div>
                            <span className="text-[10px] uppercase tracking-[2px] text-high-muted">Psikososyal Analiz Çerçevesi</span>
                            <h1 className="font-serif italic text-2xl md:text-3xl text-high-ink">Kötülüğün Anatomisi: Bir Süreç Eğrisi</h1>
                        </div>
                        <div className="text-right hidden md:block">
                            <span className="text-[10px] uppercase tracking-[2px] text-high-muted">Görselleştirme No: 08-X</span>
                            <div className="text-xs font-bold text-high-ink">Faktör Etkileşim Grafiği</div>
                        </div>
                    </nav>

                    {/* 2. GİRİŞ (HERO) BÖLÜMÜ */}
                    <section className="flex flex-col md:flex-row items-center gap-16">
                        <div className="flex-1 space-y-6">
                            <div className="inline-flex items-center gap-2 px-2 py-1 bg-high-blue text-white text-[9px] font-bold uppercase tracking-wider">
                                <Icon name="sparkles" className="w-3 h-3" /> Bilişsel & Sosyal Analiz Sistemi
                            </div>
                            <h2 className="font-serif text-5xl italic leading-[1.1] text-high-ink">
                                Kötülüğün Doğuşu ve <br /> 
                                <span className="text-high-blue">Sistematik Yükselişi</span>
                            </h2>
                            <p className="text-xs text-high-muted max-w-xl leading-relaxed uppercase tracking-wide">
                                Kötülük bir süreçtir. Genetik yatkınlıktan başlayıp, ihmal, 
                                sosyal öğrenme ve durumsal tetikleyicilerle şekillenen bu teknik eğri, 
                                insan doğasının labirentlerine ışık tutmaktadır.
                            </p>
                        </div>

                        <div className="flex-1 w-full">
                            <div className="high-density-visualizer p-8 relative rounded-sm min-h-[300px]">
                                <div className="flex justify-between items-start mb-12">
                                    <div className="space-y-1">
                                        <h3 className="font-serif italic text-xl text-high-ink">Eğilim Analizi</h3>
                                        <p className="text-[10px] uppercase text-high-muted tracking-widest">Kumülatif Etki İndeksi (CEI)</p>
                                    </div>
                                    <div className="px-2 py-1 bg-high-yellow text-high-ink text-[10px] font-bold border border-high-ink">Kritik Eşik: Aşama 4</div>
                                </div>
                                <div className="h-40 flex items-end gap-[4px] relative">
                                    {stages.map((_, i) => (
                                        <motion.div 
                                            key={i}
                                            initial={{ height: 10 }}
                                            animate={{ height: 40 + i * 25 }}
                                            className={`flex-1 ${i < 3 ? 'bg-high-blue opacity-30' : i === 3 ? 'bg-high-yellow' : 'bg-high-ink'}`}
                                        />
                                    ))}
                                    <svg className="absolute inset-0 w-full h-full pointer-events-none overflow-visible">
                                        <motion.path
                                            initial={{ pathLength: 0 }}
                                            animate={{ pathLength: 1 }}
                                            transition={{ duration: 1.5 }}
                                            d="M 0 150 Q 150 145, 250 100 T 500 20"
                                            fill="none"
                                            stroke="#1A53FF"
                                            strokeWidth="2"
                                            strokeDasharray="4 4"
                                        />
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 3. İNTERAKTİF ANALİZ BÖLÜMÜ */}
                    <section className="pt-10 border-t border-high-line">
                        <div className="flex flex-col lg:flex-row gap-10">
                            <div className="lg:w-1/4 space-y-2">
                                <h2 className="font-serif italic text-xl mb-4">Eğrinin Anatomisi</h2>
                                {stages.map((stage, index) => (
                                    <button
                                        key={stage.id}
                                        onClick={() => setCurrentStage(index)}
                                        className={`w-full text-left px-4 py-3 border transition-all flex items-center gap-3 ${
                                            currentStage === index ? 'bg-high-ink text-white' : 'bg-white hover:border-high-ink'
                                        }`}
                                    >
                                        <Icon name={stage.icon} className={`w-4 h-4 ${currentStage === index ? 'text-high-yellow' : 'text-high-muted'}`} />
                                        <div>
                                            <span className="block text-[8px] font-bold uppercase opacity-60">Seviye 0{index + 1}</span>
                                            <h4 className="font-bold text-[10px] uppercase">{stage.title}</h4>
                                        </div>
                                    </button>
                                ))}
                            </div>

                            <div className="lg:w-3/4 high-density-visualizer rounded-sm overflow-hidden flex flex-col min-h-[400px]">
                                <AnimatePresence mode="wait">
                                    <motion.div
                                        key={stages[currentStage].id}
                                        initial={{ opacity: 0, y: 10 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        exit={{ opacity: 0, y: -10 }}
                                        className="p-8 flex-1"
                                    >
                                        <div className="flex justify-between items-center border-b border-high-line pb-4 mb-6">
                                            <h2 className="font-serif italic text-2xl text-high-ink">{stages[currentStage].subtitle}</h2>
                                            <span className="text-[10px] font-bold px-2 py-1 bg-high-ink text-white">AIS-GRD-0{currentStage + 1}</span>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                            <div className="space-y-6">
                                                <div className="high-density-callout p-5 bg-slate-50 border-l-4 border-high-blue">
                                                    <p className="text-xs italic font-serif">"{stages[currentStage].description}"</p>
                                                </div>
                                                <div>
                                                    <h3 className="text-[10px] font-bold uppercase mb-3">Baskın Faktörler</h3>
                                                    {stages[currentStage].factors.map(f => (
                                                        <div key={f} className="text-[10px] p-2 bg-white border border-high-line mb-1">{f}</div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="p-5 border border-high-line bg-slate-50/30">
                                                <h3 className="text-[10px] font-bold uppercase mb-3 flex items-center gap-2"><Icon name="shield-alert" className="w-3 h-3"/> Değerlendirme Raporu</h3>
                                                <p className="text-[10px] leading-relaxed text-high-muted">
                                                    Bu seviyedeki birikim, maruz kalınan faktörlerin şiddetiyle doğru orantılı olarak kritik eşiği tetikleyebilir.
                                                </p>
                                            </div>
                                        </div>
                                    </motion.div>
                                </AnimatePresence>
                                <div className="p-4 bg-slate-50 border-t flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="flex gap-1">
                                            {stages.map((_, i) => (
                                                <div key={i} className={`h-1 w-6 ${i === currentStage ? 'bg-high-blue' : 'bg-high-line'}`} />
                                            ))}
                                        </div>
                                        <span className="text-[9px] font-bold text-high-muted uppercase">Index 0{currentStage + 1} / 05</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <button disabled={currentStage === 0} onClick={() => setCurrentStage(s => s - 1)} className="px-3 py-1 border text-[10px] font-bold uppercase disabled:opacity-20">Geri</button>
                                        <button disabled={currentStage === 4} onClick={() => setCurrentStage(s => s + 1)} className="px-4 py-1 bg-high-ink text-white text-[10px] font-bold uppercase disabled:opacity-20 flex items-center gap-2">İleri <Icon name="chevron-right" className="w-3 h-3"/></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 4. FELSEFİ ANALİZ SÜTUNLARI - YENİ EKLENEN KISIM */}
                    <section className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 pt-10 border-t border-high-ink">
                        <div className="space-y-2">
                            <h4 className="font-serif italic text-lg text-high-ink">Kalıtsallık mı?</h4>
                            <p className="text-[10px] text-high-muted leading-relaxed uppercase tracking-wide">
                                Zimbardo'ya göre, hepimiz içimizde hem en asil hem de en aşağılık davranışları barındırıyoruz.
                            </p>
                        </div>
                        <div className="space-y-2">
                            <h4 className="font-serif italic text-lg text-high-ink">İhmal Faktörü</h4>
                            <p className="text-[10px] text-high-muted leading-relaxed uppercase tracking-wide">
                                Erken yaşta maruz kalınan duygusal yoksunluk, beynin empati merkezlerini köreltir.
                            </p>
                        </div>
                        <div className="space-y-2">
                            <h4 className="font-serif italic text-lg text-high-ink">Ahlaki Çözülme</h4>
                            <p className="text-[10px] text-high-muted leading-relaxed uppercase tracking-wide">
                                Bandura'nın teorisi, vicdanın nasıl devre dışı bırakılabileceğini açıklar.
                            </p>
                        </div>
                        <div className="space-y-2">
                            <h4 className="font-serif italic text-lg text-high-ink">Durumun Gücü</h4>
                            <p className="text-[10px] text-high-muted leading-relaxed uppercase tracking-wide">
                                Otoriteye itaat, sıradan insanları canavarlaştırabilir (Milgram).
                            </p>
                        </div>
                    </section>

                    {/* 5. DETAYLI FOOTER */}
                    <footer className="py-12 border-t border-high-line text-center space-y-6">
                        <div className="flex flex-col items-center">
                            <span className="font-serif italic text-2xl text-high-ink">The Malice Gradient</span>
                            <span className="text-[8px] uppercase tracking-[4px] text-high-muted mt-1">Behavioral Dynamics System</span>
                        </div>
                        <p className="text-[9px] text-high-muted max-w-lg mx-auto uppercase tracking-wider leading-relaxed">
                            BU ÇALIŞMA PSİKOLOJİ, GENETİK VE SOSYOLOJİ ALANINDAKİ ARAŞTIRMALARA DAYANMAKTADIR.
                        </p>
                        <div className="flex justify-center gap-8 text-[9px] font-bold text-high-ink uppercase tracking-widest">
                            <a href="#" className="hover:text-high-blue transition-colors">Kaynaklar</a>
                            <a href="#" className="hover:text-high-blue transition-colors">Terminoloji</a>
                            <a href="#" className="hover:text-high-blue transition-colors">Telif</a>
                        </div>
                        <p className="text-[8px] text-high-line font-bold mt-4 uppercase">© 2026 BEHAVIORAL DYNAMICS LAB. 0.01-STABLE</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
